<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOLO DELICIOSO</title>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css" />
    <!-- jQuery, Popper.js, Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="logobolodelicioso.png" alt="Logo Bolo delicioso" />
        <span>BOLO DELICIOSO</span>
      </div>
      <nav>
        <a href="index.html">Página inicial</a>
        <a href="promoções.html">Promoções</a>
        <a href="mais-vendidos.html">Mais vendidos</a>
      </nav>
      <div class="header-buttons">
        <a href="login.html" class="login-btn">Entre ou Cadastre-se</a>
        <a href="carrinho.html" class="cart-btn">
          <img src="carrinho-carrinho.webp" alt="Carrinho" />
        </a>
      </div>
    </header>

    <main>
      <!-- Carousel -->
      <section class="carousel">
        <div
          id="carouselExampleIndicators"
          class="carousel slide"
          data-ride="carousel"
          data-interval="3000"
        >
          <ol class="carousel-indicators">
            <li
              data-target="#carouselExampleIndicators"
              data-slide-to="0"
              class="active"
            ></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
          </ol>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="bannerbolo1.jpg"
                class="d-block w-100"
                alt="Banner1"
              />
              <div class="carousel-caption d-md-block">
                <h5></h5>
                <p></p>
              </div>
            </div>
            <div class="carousel-item">
              <img
                src="bannerbolo2.jpg"
                class="d-block w-100"
                alt="Banner2"
              />
            </div>
            <div class="carousel-item">
              <img
                src="bannerbolo3.jpg"
                class="d-block w-100"
                alt="Banner3"
              />
              <div class="carousel-caption d-md-block">
                <h5></h5>
                <p></p>
              </div>
            </div>
          </div>
          <a
            class="carousel-control-prev"
            href="#carouselExampleIndicators"
            role="button"
            data-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Anterior</span>
          </a>
          <a
            class="carousel-control-next"
            href="#carouselExampleIndicators"
            role="button"
            data-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Próximo</span>
          </a>
        </div>
      </section>

      <section class="info">
        <div class="info-box">
          <p>Frete acessível para todo o Brasil</p>
        </div>
        <div class="info-box">
          <p>Atendimento ao cliente das 12 às 18h de segunda à sábado</p>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <div class="contact-info">
          <h3>Entre em Contato</h3>
          <p>Telefone: (11) 1234-5678</p>
          <p>Email: contato@bolodelicioso.com</p>
          <div class="social-media">
            <a
              href="https://facebook.com"
              target="_blank"
              aria-label="Facebook"
            >
              <img src="facebook.webp" alt="Facebook" />
            </a>
            <a
              href="https://instagram.com"
              target="_blank"
              aria-label="Instagram"
            >
              <img src="instagram.webp" alt="Instagram" />
            </a>
            <a href="https://twitter.com" target="_blank" aria-label="Twitter">
              <img src="twitter.webp" alt="Twitter" />
            </a>
          </div>
        </div>

        <div class="payment-methods">
          <h3>Métodos de Pagamento</h3>
          <img src="recibo.webp" alt="Boleto" />
          <img src="cartao.webp" alt="Cartão" />
          <img src="paypal.webp" alt="PayPal" />
        </div>
      </div>
    </footer>
  </body>
</html>
